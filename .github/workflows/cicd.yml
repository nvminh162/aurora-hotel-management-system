name: CI/CD Pipeline

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker compose build aurora-backend aurora-frontend
          docker compose push aurora-backend aurora-frontend

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute remote SSH commands using SSH key
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_PASSWORD
          script: |
            TARGET_DIR="/home/ubuntu/app/aurora-hotel-management-system"
            
            # 1. Tạo thư mục và lấy code
            mkdir -p $TARGET_DIR
            cd $TARGET_DIR
            
            if [ ! -d ".git" ]; then
              echo "Thư mục trống, đang tiến hành clone code..."
              git clone https://github.com/${{ github.repository }}.git .
            else
              echo "Đã có code, đang cập nhật..."
              git fetch origin master
              git reset --hard origin/master
            fi
            
            # 2. Đăng nhập Docker Hub (dùng sudo để tránh lỗi quyền)
            echo "${{ secrets.DOCKERHUB_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # 3. Chuẩn bị biến và chạy Docker Compose
            USER_LOWER=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')
            
            # Pull và Up (dùng sudo)
            sudo DOCKERHUB_USERNAME=$USER_LOWER docker compose pull
            sudo DOCKERHUB_USERNAME=$USER_LOWER docker compose up -d
            
            # Dọn dẹp
            sudo docker system prune -f


