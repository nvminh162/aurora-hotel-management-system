name: CI/CD Pipeline

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          # Convert username to lowercase
          USER_LOWER=$(echo "$DOCKERHUB_USERNAME" | tr '[:upper:]' '[:lower:]')
          
          docker compose build aurora-backend aurora-frontend
          
          # Tag and push with lowercase username
          docker tag $USER_LOWER/aurora-backend:latest $USER_LOWER/aurora-backend:latest
          docker tag $USER_LOWER/aurora-frontend:latest $USER_LOWER/aurora-frontend:latest
          
          docker compose push aurora-backend aurora-frontend

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute remote SSH commands using SSH key
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
          ENV_FILE: ${{ secrets.ENV_FILE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_PASSWORD,ENV_FILE,GITHUB_TOKEN
          script: |
            TARGET_DIR="/home/ubuntu/app/aurora-hotel-management-system"
            
            mkdir -p $TARGET_DIR
            cd $TARGET_DIR || { echo "Lỗi: Không thể chuyển vào thư mục $TARGET_DIR"; exit 1; }
            
            # Sử dụng GitHub Token để xác thực dự án Private (Tự động hoàn toàn)
            REPO_URL="https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git"
            
            if [ ! -d ".git" ]; then
              echo "Thư mục trống, đang tiến hành clone code..."
              git clone $REPO_URL . || { echo "Lỗi: Clone thất bại!"; exit 1; }
            else
              echo "Đã có code, đang cập nhật..."
              git remote set-url origin $REPO_URL
              git fetch origin master && git reset --hard origin/master || { echo "Lỗi: Cập nhật thất bại!"; exit 1; }
            fi
            
            echo "--- DANH SÁCH FILE SAU KHI LẤY CODE ---"
            ls -la
            
            # Tự động tạo file .env từ Secret ENV_FILE
            if [ ! -z "$ENV_FILE" ]; then
              echo "Đang tạo file .env từ Secret..."
              echo "$ENV_FILE" > .env
            else
              echo "Cảnh báo: Không tìm thấy Secret ENV_FILE. Vui lòng kiểm tra file .env trên server."
            fi
            
            # Đăng nhập Docker Hub
            echo "$DOCKERHUB_PASSWORD" | sudo docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            
            # Chuẩn bị biến và chạy Docker Compose
            USER_LOWER=$(echo "$DOCKERHUB_USERNAME" | tr '[:upper:]' '[:lower:]')
            sudo DOCKERHUB_USERNAME=$USER_LOWER docker compose pull
            sudo DOCKERHUB_USERNAME=$USER_LOWER docker compose up -d
            sudo docker system prune -f
