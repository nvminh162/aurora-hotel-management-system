services:
  rag_postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-aurora_hotel}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "5432:5432"
    volumes:
      - rag_pgdata:/var/lib/postgresql/data
    networks:
      - aurora-network

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: aurora_pgadmin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@gmail.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - rag_postgres
    networks:
      - aurora-network

  redis:
    image: redis:7.2-alpine
    container_name: aurora-redis
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: sh -c 'redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD:-admin}"'
    networks:
      - aurora-network

  redisinsight:
    image: redis/redisinsight:latest
    container_name: aurora_redisinsight
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RITRUSTEDORIGINS: ${RITRUSTEDORIGINS:-http://localhost:8001,http://127.0.0.1:8001}
    ports:
      - "8001:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    networks:
      - aurora-network

volumes:
  rag_pgdata:
  redis_data:
  redisinsight_data:

networks:
  aurora-network:
    driver: bridge
