services:
  aurora-frontend:
    build:
      context: ./aurora-frontend
      dockerfile: Dockerfile
    image: "${DOCKER_USERNAME}/aurora-frontend:latest"
    ports:
      - "80:80"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      # - VITE_CLOUDINARY_CLOUD_NAME=${VITE_CLOUDINARY_CLOUD_NAME}
      # - VITE_CLOUDINARY_UPLOAD_PRESET=${VITE_CLOUDINARY_UPLOAD_PRESET}
    depends_on:
      - aurora-backend
  aurora-backend:
    build:
      context: .
      dockerfile: aurora-backend/Dockerfile
    image: "${DOCKER_USERNAME}/aurora-backend:latest"
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SIGNER_KEY=${JWT_SIGNER_KEY}
      - ACCESS_TOKEN_VALID_DURATION=${ACCESS_TOKEN_VALID_DURATION}
      - REFRESH_TOKEN_VALID_DURATION=${REFRESH_TOKEN_VALID_DURATION}
      - VNPAY_TMN_CODE=${VNPAY_TMN_CODE}
      - VNPAY_HASH_SECRET=${VNPAY_HASH_SECRET}
      - VNPAY_RETURN_URL=${VNPAY_RETURN_URL}
      - VNPAY_IPN_URL=${VNPAY_IPN_URL}
      - GEMINI_AI_KEY=${GEMINI_AI_KEY}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - CLOUDINARY_SECURE=${CLOUDINARY_SECURE}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE}
      - MAX_REQUEST_SIZE=${MAX_REQUEST_SIZE}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - MAIL_FROM_EMAIL=${MAIL_FROM_EMAIL}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
  rag_postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: aurora_hotel
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - rag_pgdata:/var/lib/postgresql/data
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d aurora_hotel"]
      interval: 10s
      timeout: 5s
      retries: 5
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: aurora_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - rag_postgres
  redis:
    image: redis:7.2-alpine
    container_name: aurora-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass admin
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "admin", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
  redisinsight:
    image: redis/redisinsight:latest
    container_name: aurora_redisinsight
    restart: unless-stopped
    ports:
      - "8001:5540"
    volumes:
      - redisinsight_data:/data
    environment:
      RITRUSTEDORIGINS: "http://localhost:8001,http://127.0.0.1:8001"
    depends_on:
      - redis

volumes:
  rag_pgdata:
  redis_data:
  redisinsight_data: